<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="chat-container">
  <div class="app-shell">
    <div id="users" class="sidebar">
      <div class="header"><i class="fas fa-users"></i> Online Users</div>
    </div>
    <div class="chat-panel">
      <div class="header"><i class="fas fa-comments"></i> Chat</div>
      <div id="typing" style="color:#6b7280; padding-left:20px;"></div>
      <div class="messages" id="messages"></div>
      <div class="input-box">
        <input id="msg" placeholder="Type a message..." oninput="typingHandler()" onkeypress="handleKeyPress(event)">
        <button onclick="send()"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Call Interface -->
<div class="call-interface" id="callInterface">
  <div class="call-container">
    <h3 id="callTitle">Incoming Call</h3>
    <p id="callMessage">from <span id="callerName"></span></p>
    <div class="call-buttons-large">
      <button class="call-btn-large end-call" onclick="endCall()">
        <i class="fas fa-phone-slash"></i> End Call
      </button>
      <button class="call-btn-large accept-call" id="acceptCallBtn" onclick="acceptCall()">
        <i class="fas fa-phone"></i> Accept
      </button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// username login page se ayega
let username = localStorage.getItem("username");

// current room variable
let currentRoom = "";
let activeUserElement = null;

// WebRTC variables
let localStream;
let remoteStream;
let peerConnection;
let isCaller = false;
let currentCallUser = null;
let currentCallType = null;

// STUN servers for WebRTC
const configuration = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

// ❌ agar direct chat page open kare
if(!username){
  window.location.href = "index.html";
}

// Check WebRTC support
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  alert("WebRTC is not supported in this browser. Please use a modern browser like Chrome, Firefox, or Edge.");
}

// Authenticate socket with username
socket.emit("authenticate", username);

// 🔥 default room (global)
currentRoom = username + "_global";
socket.emit("joinRoom", currentRoom);

// 🔥 NEW: user list receive
socket.on("userList", function(users){

  let usersDiv = document.getElementById("users");

  usersDiv.innerHTML = "<b><i class='fas fa-users'></i> Online Users</b><br>";

  users.forEach(user => {

    if(user.name !== username){

      let statusColor = user.online ? "#10b981" : "#6b7280";

      usersDiv.innerHTML += `
        <div class="user-item" data-user="${user.name}" onclick="startChat('${user.name}')">
          <span class="status-dot" style="color:${statusColor}; font-size: 8px;">●</span> 
          <span>${user.name}</span>
          <div class="call-buttons">
            <button class="call-btn voice-call" onclick="startVoiceCall('${user.name}', event)">
              <i class="fas fa-phone"></i>
            </button>
            <button class="call-btn video-call" onclick="startVideoCall('${user.name}', event)">
              <i class="fas fa-video"></i>
            </button>
          </div>
        </div>
      `;
    }

  });

});

let typingTimeout;

function typingHandler(){
  socket.emit("typing", currentRoom);

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    socket.emit("stopTyping", currentRoom);
  }, 1000);
}

function handleKeyPress(event){
  if(event.key === "Enter") {
    event.preventDefault();
    send();
  }
}


socket.on("typing", function(user){
if(user !== username){
  document.getElementById("typing").innerText = user + " is typing...";
}
});

socket.on("stopTyping", function(){
  document.getElementById("typing").innerText = "";
});

// Socket event handlers for calls
socket.on("incomingCall", (data) => {
  console.log("Incoming call from:", data.from, "type:", data.type);

  if (peerConnection) {
    // Already in a call, reject
    socket.emit("callRejected", { to: data.from });
    return;
  }

  currentCallUser = data.from;
  currentCallType = data.type;
  isCaller = false;

  document.getElementById("callInterface").style.display = "flex";
  document.getElementById("callTitle").textContent = "Incoming Call";
  document.getElementById("callMessage").textContent = `${data.type} call`;
  document.getElementById("callerName").textContent = data.from;
  document.getElementById("acceptCallBtn").style.display = "block";
});

socket.on("callAccepted", (data) => {
  console.log("Call accepted by:", data.from);
  document.getElementById("callTitle").textContent = "Ringing...";
  document.getElementById("callMessage").textContent = "Connecting call";
});

socket.on("callEnded", () => {
  console.log("Call ended");
  endCall();
});

socket.on("callRejected", () => {
  console.log("Call rejected");
  alert("Call was rejected");
  endCall();
});

socket.on("iceCandidate", (data) => {
  console.log("Received ICE candidate");
  if (peerConnection) {
    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
      .catch(error => console.error("Error adding ICE candidate:", error));
  }
});

socket.on("callOffer", (data) => {
  console.log("Received call offer from:", data.from, "with SDP:", !!data.sdp);

  if (isCaller || !peerConnection) {
    console.log("Ignoring call offer - either caller or no peer connection yet");
    return;
  }

  // This is for when we receive an offer with SDP (after media is ready)
  if (data.sdp && peerConnection) {
    console.log("Setting remote description from offer");
    peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp))
      .then(() => {
        console.log("Creating answer");
        return peerConnection.createAnswer();
      })
      .then(answer => {
        console.log("Setting local description");
        return peerConnection.setLocalDescription(answer);
      })
      .then(() => {
        console.log("Sending answer");
        socket.emit("callAnswer", {
          to: data.from,
          sdp: peerConnection.localDescription
        });
      })
      .catch(error => {
        console.error("Error handling call offer:", error);
        endCall();
      });
  }
});

socket.on("callAnswer", (data) => {
  console.log("Received call answer");
  if (isCaller && peerConnection && data.sdp) {
    peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp))
      .catch(error => console.error("Error setting remote description:", error));
  }
});

// 🔥 NEW: start private chat
function startChat(otherUser){
  currentRoom = [username, otherUser].sort().join("_");

  socket.emit("joinRoom", currentRoom);

  document.getElementById("messages").innerHTML = "";

  // Remove active class from previous user
  if(activeUserElement) {
    activeUserElement.classList.remove("active");
  }

  // Add active class to clicked user
  const userElement = document.querySelector(`[data-user="${otherUser}"]`);
  if(userElement) {
    userElement.classList.add("active");
    activeUserElement = userElement;
  }

  console.log("Chat with:", otherUser);
}

// Call functions
function startVoiceCall(user, event) {
  event.stopPropagation();
  initiateCall(user, 'voice');
}

function startVideoCall(user, event) {
  event.stopPropagation();
  initiateCall(user, 'video');
}

function initiateCall(user, type) {
  if (peerConnection) {
    alert("You're already in a call!");
    return;
  }

  console.log("Initiating call to:", user, "type:", type);

  currentCallUser = user;
  currentCallType = type;
  isCaller = true;

  // Show call interface
  document.getElementById("callInterface").style.display = "flex";
  document.getElementById("callTitle").textContent = `Calling ${user}...`;
  document.getElementById("callMessage").textContent = `${type} call`;
  document.getElementById("callerName").textContent = user;
  document.getElementById("acceptCallBtn").style.display = "none";

  // Start WebRTC
  startWebRTC(type === 'video');
}

function startWebRTC(withVideo = false) {
  console.log("Starting WebRTC with video:", withVideo);

  // Check if already have a peer connection
  if (peerConnection) {
    console.log("Peer connection already exists");
    return;
  }

  navigator.mediaDevices.getUserMedia({
    audio: true,
    video: withVideo
  }).then(stream => {
    console.log("Got media stream, tracks:", stream.getTracks().length);
    localStream = stream;

    // Create peer connection
    peerConnection = new RTCPeerConnection(configuration);
    console.log("Created peer connection");

    // Add local stream
    localStream.getTracks().forEach(track => {
      console.log("Adding track:", track.kind);
      peerConnection.addTrack(track, localStream);
    });

    // Handle remote stream
    peerConnection.ontrack = event => {
      console.log("Received remote stream with tracks:", event.streams[0].getTracks().length);
      remoteStream = event.streams[0];
      // In a real app, you'd display the remote video/audio here
      console.log("Remote stream received, call connected!");
      document.getElementById("callTitle").textContent = "Connected";
      document.getElementById("callMessage").textContent = "Call in progress";
    };

    // Handle ICE candidates
    peerConnection.onicecandidate = event => {
      if (event.candidate) {
        console.log("Sending ICE candidate");
        socket.emit("iceCandidate", {
          to: currentCallUser,
          candidate: event.candidate
        });
      }
    };

    // Handle connection state changes
    peerConnection.onconnectionstatechange = () => {
      console.log("Connection state:", peerConnection.connectionState);
    };

    // Handle ICE connection state changes
    peerConnection.oniceconnectionstatechange = () => {
      console.log("ICE connection state:", peerConnection.iceConnectionState);
    };

    // Create offer if caller
    if (isCaller) {
      console.log("Creating offer as caller");
      peerConnection.createOffer().then(offer => {
        console.log("Created offer, setting local description");
        return peerConnection.setLocalDescription(offer);
      }).then(() => {
        console.log("Sending call offer with SDP");
        socket.emit("callOffer", {
          to: currentCallUser,
          from: username,
          type: currentCallType,
          sdp: peerConnection.localDescription
        });
      }).catch(error => {
        console.error("Error creating offer:", error);
        alert("Failed to create call offer: " + error.message);
        endCall();
      });
    }
  }).catch(error => {
    console.error("Error accessing media devices:", error);
    alert("Could not access camera/microphone. Please check permissions and try again.\nError: " + error.message);
    endCall();
  });
}

function acceptCall() {
  console.log("Accepting call from:", currentCallUser, "type:", currentCallType);

  // Hide accept button
  document.getElementById("acceptCallBtn").style.display = "none";
  document.getElementById("callTitle").textContent = "Connecting...";
  document.getElementById("callMessage").textContent = "Setting up call";

  // Start WebRTC for receiver
  startWebRTC(currentCallType === 'video');

  // Notify caller that call was accepted
  socket.emit("callAccepted", {
    to: currentCallUser,
    from: username
  });
}

function endCall() {
  console.log("Ending call");

  document.getElementById("callInterface").style.display = "none";

  // Stop media streams
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }

  // Close peer connection
  if (peerConnection) {
    peerConnection.close();
  }

  // Reset variables
  localStream = null;
  remoteStream = null;
  peerConnection = null;
  currentCallUser = null;
  currentCallType = null;
  isCaller = false;

  socket.emit("endCall", { to: currentCallUser });
}

function send(){
  let msg = document.getElementById("msg").value;
  if(msg.trim() === "") return;

  // 🔥 NEW: unique message ID
  const messageId = Date.now();

  socket.emit("chat message", {
    msg: msg,
    roomId: currentRoom,
    id: messageId   // 👈 yaha add kiya
  });

  document.getElementById("msg").value = "";

  // Add animation to send button
  const sendBtn = document.querySelector(".input-box button");
  sendBtn.style.animation = "none";
  setTimeout(() => {
    sendBtn.style.animation = "sendPulse 0.6s ease-out";
  }, 10);
}

socket.on("chat message", function(data){
  let div = document.createElement("div");

  div.classList.add("message");

  if(data.user === username){
    div.classList.add("sent");
  } else {
    div.classList.add("received");

  socket.emit("delivered", {
  roomId: currentRoom,
  id: data.id
});

socket.emit("seen", {
  roomId: currentRoom,
  id: data.id
});

  }

 div.innerHTML = `
  <div id="msg-${data.id}">
    <div><strong>${data.user}</strong></div>
    <div>${data.original}</div>
    ${data.translated && data.translated !== data.original 
      ? `<small><i class="fas fa-globe"></i> ${data.translated}</small>` 
      : ""}
    <small id="status-${data.id}" style="float:right;"><i class="fas fa-check"></i></small>
  </div>
`;

  document.getElementById("messages").appendChild(div);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
});

socket.on("delivered", function(id){
  let el = document.getElementById("status-" + id);
  if(el) el.innerHTML = '<i class="fas fa-check-double"></i>';
});

socket.on("seen", function(id){
  let el = document.getElementById("status-" + id);
  if(el) el.innerHTML = '<i class="fas fa-check-double" style="color:#10b981;"></i>';
});

</script>

</body>
</html>
