<!DOCTYPE html>
<html>
<head>
  <title>Chat App - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <h2><i class="fas fa-comments"></i> Chat App</h2>
    <p>Welcome back 👋</p>

    <input id="username" placeholder="Enter username">
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
    
    <button onclick="register()"><i class="fas fa-user-plus"></i> Register</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function login(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if(username.trim() === "" || password.trim() === "") return;

  socket.emit("login", { username, password });
}

function register(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if(username.trim() === "" || password.trim() === "") return;

  socket.emit("register", { username, password });
}

socket.on("loginError", (msg) => {
  alert(msg);
});

socket.on("loginSuccess", (username) => {
  sessionStorage.setItem("username", username);
  localStorage.setItem("username", username);
  window.location.href = "home.html";
});

socket.on("registerError", (msg) => {
  alert(msg);
});

socket.on("registerSuccess", (msg) => {
  alert(msg);
});
</script>

</body>
</html>
